name: Build MinGW-w64

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-w64-mingw32
            filename: mingw-windows-x86-64.7z
            apt_mingw: "gcc-mingw-w64-x86-64-posix g++-mingw-w64-x86-64-posix binutils-mingw-w64-x86-64"
          - target: aarch64-w64-mingw32
            filename: mingw-windows-aarch64.7z
            apt_mingw: ""

    env:
      TARGET: ${{ matrix.target }}
      PREFIX: ${{ github.workspace }}/mingw-install
      BINUTILS_VERSION: "2.44"
      GCC_VERSION: "15.1.0"
      MAKE_VERSION: "4.4.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential flex bison texinfo \
            libgmp-dev libmpfr-dev libmpc-dev \
            mingw-w64-common \
            wget p7zip-full \
            ${{ matrix.apt_mingw }}

      - name: Set up apt mingw prefix
        if: matrix.apt_mingw != ''
        run: |
          # Point PREFIX at the apt-installed sysroot so later steps are consistent
          APT_PREFIX=$(dirname $(dirname $(which x86_64-w64-mingw32-gcc-posix)))
          echo "PREFIX=$APT_PREFIX" >> $GITHUB_ENV
          echo "$APT_PREFIX/bin" >> $GITHUB_PATH

      - name: Cache build output
        if: matrix.apt_mingw == ''
        id: cache-build
        uses: actions/cache@v5
        with:
          path: ${{ env.PREFIX }}
          key: mingw-install-${{ matrix.target }}-binutils${{ env.BINUTILS_VERSION }}-gcc${{ env.GCC_VERSION }}-make${{ env.MAKE_VERSION }}

      - name: Cache source tarballs
        if: matrix.apt_mingw == '' && steps.cache-build.outputs.cache-hit != 'true'
        uses: actions/cache@v5
        with:
          path: |
            binutils-${{ env.BINUTILS_VERSION }}.tar.xz
            gcc-${{ env.GCC_VERSION }}.tar.xz
            make-${{ env.MAKE_VERSION }}.tar.gz
          key: sources-${{ env.BINUTILS_VERSION }}-${{ env.GCC_VERSION }}-${{ env.MAKE_VERSION }}

      - name: Clone mingw-w64
        if: matrix.apt_mingw == '' && steps.cache-build.outputs.cache-hit != 'true'
        run: git clone --depth=1 https://github.com/mingw-w64/mingw-w64.git

      - name: Download sources
        if: matrix.apt_mingw == '' && steps.cache-build.outputs.cache-hit != 'true'
        run: |
          [ -f binutils-${BINUTILS_VERSION}.tar.xz ] || wget -q https://ftp.gnu.org/gnu/binutils/binutils-${BINUTILS_VERSION}.tar.xz
          [ -f gcc-${GCC_VERSION}.tar.xz ]           || wget -q https://ftp.gnu.org/gnu/gcc/gcc-${GCC_VERSION}/gcc-${GCC_VERSION}.tar.xz
          [ -f make-${MAKE_VERSION}.tar.gz ]          || wget -q https://ftp.gnu.org/gnu/make/make-${MAKE_VERSION}.tar.gz
          tar xf binutils-${BINUTILS_VERSION}.tar.xz
          tar xf gcc-${GCC_VERSION}.tar.xz
          tar xf make-${MAKE_VERSION}.tar.gz

      - name: Download make sources
        if: matrix.apt_mingw != ''
        run: |
          [ -f gcc-${GCC_VERSION}.tar.xz ] || wget -q https://ftp.gnu.org/gnu/gcc/gcc-${GCC_VERSION}/gcc-${GCC_VERSION}.tar.xz
          [ -f make-${MAKE_VERSION}.tar.gz ] || wget -q https://ftp.gnu.org/gnu/make/make-${MAKE_VERSION}.tar.gz
          tar xf gcc-${GCC_VERSION}.tar.xz
          tar xf make-${MAKE_VERSION}.tar.gz

      - name: Build binutils
        if: matrix.apt_mingw == '' && steps.cache-build.outputs.cache-hit != 'true'
        run: |
          mkdir build-binutils && cd build-binutils
          ../binutils-${BINUTILS_VERSION}/configure \
            --target=$TARGET \
            --prefix=$PREFIX \
            --disable-nls \
            --disable-multilib \
            --disable-werror
          make -j$(nproc)
          make install

      - name: Install mingw-w64 headers
        if: matrix.apt_mingw == '' && steps.cache-build.outputs.cache-hit != 'true'
        run: |
          mkdir build-headers && cd build-headers
          ../mingw-w64/mingw-w64-headers/configure \
            --host=$TARGET \
            --prefix=$PREFIX/$TARGET
          make install

      - name: Build GCC (cross-compiler)
        if: matrix.apt_mingw == '' && steps.cache-build.outputs.cache-hit != 'true'
        run: |
          mkdir build-gcc && cd build-gcc
          ../gcc-${GCC_VERSION}/configure \
            --target=$TARGET \
            --prefix=$PREFIX \
            --with-sysroot=$PREFIX/$TARGET \
            --with-native-system-header-dir=/include \
            --enable-languages=c,c++ \
            --disable-bootstrap \
            --disable-multilib \
            --disable-nls \
            --disable-libgomp \
            --disable-libquadmath \
            --disable-libssp \
            --disable-shared
          make -j$(nproc) all-gcc
          make install-gcc

      - name: Build mingw-w64 CRT
        if: matrix.apt_mingw == '' && steps.cache-build.outputs.cache-hit != 'true'
        run: |
          export PATH=$PREFIX/bin:$PATH
          mkdir build-crt && cd build-crt
          ../mingw-w64/mingw-w64-crt/configure \
            --host=$TARGET \
            --prefix=$PREFIX/$TARGET \
            --with-sysroot=$PREFIX/$TARGET \
            --disable-lib32
          make -j$(nproc)
          make install

      - name: Build libgcc
        if: matrix.apt_mingw == '' && steps.cache-build.outputs.cache-hit != 'true'
        run: |
          export PATH=$PREFIX/bin:$PATH
          cd build-gcc
          make -j$(nproc) all-target-libgcc
          make install-target-libgcc

      - name: Build GCC for Windows (native executables)
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: |
          export PATH=$PREFIX/bin:$PATH
          mkdir build-gcc-native && cd build-gcc-native
          ../gcc-${GCC_VERSION}/configure \
            --host=$TARGET \
            --target=$TARGET \
            --prefix=/mingw64 \
            --with-sysroot=$PREFIX/$TARGET \
            --with-native-system-header-dir=/include \
            --enable-languages=c,c++ \
            --disable-bootstrap \
            --disable-multilib \
            --disable-nls \
            --disable-libgomp \
            --disable-libquadmath \
            --disable-libssp \
            --disable-shared
          make -j$(nproc) all-gcc
          make install-gcc DESTDIR=$PREFIX

      - name: Patch make sources
        run: patch -p1 -d make-${MAKE_VERSION} < ${{ github.workspace }}/patches/make.patch

      - name: Build make (cross-compiled for Windows)
        run: |
          export PATH=$PREFIX/bin:$PATH
          mkdir build-make && cd build-make
          ../make-${MAKE_VERSION}/configure \
            --host=$TARGET \
            --prefix=$PREFIX \
            --disable-nls \
            --without-guile
          make -j$(nproc)
          make install

      - name: Strip debug info
        run: |
          export PATH=$PREFIX/bin:$PATH
          find $PREFIX -type f \( -name "*.exe" -o -name "*.dll" -o -name "*.a" \) \
            -exec $TARGET-strip --strip-unneeded {} \; 2>/dev/null || true
          find $PREFIX -type f ! -name "*.*" \
            -exec strip --strip-unneeded {} \; 2>/dev/null || true

      - name: Stage package
        run: |
          STAGE=${{ github.workspace }}/stage
          mkdir -p $STAGE

          cp -r $PREFIX/bin $STAGE/
          cp -r $PREFIX/libexec $STAGE/
          cp -r $PREFIX/lib $STAGE/
          cp -r $PREFIX/include $STAGE/

          mkdir -p $STAGE/$TARGET/include
          cp -r $PREFIX/$TARGET/include $STAGE/$TARGET/

          mkdir -p $STAGE/$TARGET/lib
          for lib in \
            libmsvcrt libucrt libucrtbase libntdll \
            libkernel32 libuser32 libadvapi32 libshell32 \
            libws2_32 libmingwex libmingw32 librpcrt4 \
            libole32 liboleaut32 libshlwapi libgdi32 \
            libimm32 libversion libwinmm libwinspool \
            libcomdlg32 libcomctl32 libuuid libsecur32 \
            libnetapi32 libuserenv libpsapi libdbghelp \
            libcrypt32 libwintrust libncrypt libbcrypt \
            libiphlpapi libdnsapi libsetupapi libcfgmgr32; do
            cp $PREFIX/$TARGET/lib/${lib}.a $STAGE/$TARGET/lib/ 2>/dev/null || true
          done

          cp $PREFIX/$TARGET/lib/libgcc*.a $STAGE/$TARGET/lib/ 2>/dev/null || true
          cp $PREFIX/$TARGET/lib/libstdc++*.a $STAGE/$TARGET/lib/ 2>/dev/null || true

      - name: Package
        run: |
          mkdir -p ${{ github.workspace }}/pkg/mingw64
          cp -r ${{ github.workspace }}/stage/. ${{ github.workspace }}/pkg/mingw64/
          cd ${{ github.workspace }}/pkg
          7z a -t7z -m0=lzma2 -mx=9 ${{ github.workspace }}/${{ matrix.filename }} . \
            -xr!"share" \
            -xr!"install-tools" \
            -xr!"plugin" \
            -x!"bin/${TARGET}-lto-dump"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.filename }}
          path: ${{ matrix.filename }}

      # - name: Upload to release
      #   uses: softprops/action-gh-release@v2
