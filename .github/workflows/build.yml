name: Build MinGW-w64

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: x86_64-w64-mingw32
                      archive: mingw-w64-x86_64
                    - target: aarch64-w64-mingw32
                      archive: mingw-w64-aarch64

        env:
            TARGET: ${{ matrix.target }}
            PREFIX: ${{ github.workspace }}/mingw-install
            BINUTILS_VERSION: "2.44"
            GCC_VERSION: "15.1.0"
            MAKE_VERSION: "4.3"

        steps:
            - name: Install dependencies
              run: |
                  sudo apt-get update -q
                  sudo apt-get install -y --no-install-recommends \
                    build-essential flex bison texinfo \
                    libgmp-dev libmpfr-dev libmpc-dev \
                    wget p7zip-full

            - name: Clone mingw-w64
              run: git clone --depth=1 https://github.com/mingw-w64/mingw-w64.git

            - name: Download sources
              run: |
                  wget -q https://ftp.gnu.org/gnu/binutils/binutils-${BINUTILS_VERSION}.tar.xz
                  wget -q https://ftp.gnu.org/gnu/gcc/gcc-${GCC_VERSION}/gcc-${GCC_VERSION}.tar.xz
                  wget -q https://ftp.gnu.org/gnu/make/make-${MAKE_VERSION}.tar.gz
                  tar xf binutils-${BINUTILS_VERSION}.tar.xz
                  tar xf gcc-${GCC_VERSION}.tar.xz
                  tar xf make-${MAKE_VERSION}.tar.gz

            - name: Build binutils
              run: |
                  mkdir build-binutils && cd build-binutils
                  ../binutils-${BINUTILS_VERSION}/configure \
                    --target=$TARGET \
                    --prefix=$PREFIX \
                    --disable-nls \
                    --disable-multilib \
                    --disable-werror
                  make -j$(nproc)
                  make install

            - name: Install mingw-w64 headers
              run: |
                  mkdir build-headers && cd build-headers
                  ../mingw-w64/mingw-w64-headers/configure \
                    --host=$TARGET \
                    --prefix=$PREFIX/$TARGET
                  make install

            - name: Build GCC (compilers only)
              run: |
                  mkdir build-gcc && cd build-gcc
                  ../gcc-${GCC_VERSION}/configure \
                    --target=$TARGET \
                    --prefix=$PREFIX \
                    --with-sysroot=$PREFIX/$TARGET \
                    --with-native-system-header-dir=/include \
                    --enable-languages=c,c++ \
                    --disable-bootstrap \
                    --disable-multilib \
                    --disable-nls \
                    --disable-libgomp \
                    --disable-libquadmath \
                    --disable-libssp \
                    --disable-shared
                  make -j$(nproc) all-gcc
                  make install-gcc

            - name: Build mingw-w64 CRT
              run: |
                  export PATH=$PREFIX/bin:$PATH
                  mkdir build-crt && cd build-crt
                  ../mingw-w64/mingw-w64-crt/configure \
                    --host=$TARGET \
                    --prefix=$PREFIX/$TARGET \
                    --with-sysroot=$PREFIX/$TARGET \
                    --disable-lib32
                  make -j$(nproc)
                  make install

            - name: Build libgcc
              run: |
                  export PATH=$PREFIX/bin:$PATH
                  cd build-gcc
                  make -j$(nproc) all-target-libgcc
                  make install-target-libgcc

            - name: Build make (cross-compiled for Windows)
              run: |
                  export PATH=$PREFIX/bin:$PATH
                  mkdir build-make && cd build-make
                  ../make-${MAKE_VERSION}/configure \
                    --host=$TARGET \
                    --prefix=$PREFIX \
                    --disable-nls \
                    --without-guile
                  make -j$(nproc)
                  make install

            - name: Package
              run: |
                  cd $PREFIX
                  7z a -t7z -m0=lzma2 -mx=9 ${{ github.workspace }}/${{ matrix.archive }}.7z .

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.archive }}
                  path: ${{ matrix.archive }}.7z
